spring.application.name=invoice_generator

# 1. Database Connection URL (Change 'invoice_db' to your actual DB name)
spring.datasource.url=jdbc:postgresql://localhost:5432/invoice_db

# 2. Your PostgreSQL Username (usually 'postgres')
spring.datasource.username=postgres

# 3. Your PostgreSQL Password
spring.datasource.password=your_password_here

# 4. Driver Class
spring.datasource.driver-class-name=org.postgresql.Driver

# 5. Hibernate/JPA Settings
# 'update' will automatically create/update tables based on your Java code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect