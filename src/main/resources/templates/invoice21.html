<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Invoice</title>
    <style>
        /*<![CDATA[*/
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&amp;display=swap');

        @page { 
            size: A4; 
            margin: 0; 
        }
        
        body { 
            font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            color: #000000; 
            background-color: #ffffff; 
            margin: 0; 
            padding: 0;
            line-height: 1.4;
        }

        .invoice-container {
            padding: 45px;
            max-width: 850px;
            margin: auto;
        }

        /* --- Global Table Wrapping Logic --- */
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Critical for text wrapping */
        }

        td, th {
            word-wrap: break-word;
            white-space: normal;
            vertical-align: top;
        }

        /* Brand Header */
        .brand-section-table { margin-bottom: 40px; }
        .logo-img { max-height: 70px; max-width: 180px; }
        .company-name-header { 
            font-size: 28px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: -1.5px; 
            margin: 0; 
            color: #000; 
        }

        /* Metadata Strip */
        .meta-strip { 
            border-top: 2px solid #000; 
            border-bottom: 1px solid #e5e7eb; 
            margin-bottom: 40px; 
            padding: 15px 0; 
        }
        .meta-label { 
            font-size: 9px; 
            font-weight: 800; 
            color: #666; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-bottom: 4px; 
        }
        .meta-value { font-size: 14px; font-weight: 700; color: #000; }

        /* Billing Layout */
        .address-grid { margin-bottom: 50px; }
        .section-heading { 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            color: #000; 
            border-bottom: 1px solid #000; 
            display: inline-block; 
            margin-bottom: 12px; 
			white-space: nowrap;
        }
        .address-text { font-size: 13px; color: #333; line-height: 1.5; padding-right: 20px; }
        .address-text strong { font-size: 15px; color: #000; display: block; margin-bottom: 3px; }

        /* Items Table */
        .item-table { margin-bottom: 30px; }
        .item-table th { 
            text-align: left; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            padding: 12px 10px; 
            border-bottom: 2px solid #000; 
        }
        .item-table td { 
            padding: 15px 10px; 
            border-bottom: 1px solid #eee; 
            font-size: 13px; 
        }
        .item-table tr:last-child td { border-bottom: 1px solid #000; }

        /* Totals */
        .summary-wrapper { width: 100%; margin-top: 10px; }
        .summary-table { width: 280px; margin-left: auto; }
        .summary-table td { padding: 8px 0; font-size: 13px; }
        .total-row td { border-top: 1px solid #000; padding-top: 15px; }
        .total-label { font-size: 14px; font-weight: 800; text-transform: uppercase; }
        .total-amount { font-size: 20px; font-weight: 800; text-align: right; }

        /* Footer Info */
        .footer-details { margin-top: 60px; }
        .notes-container { 
            font-size: 12px; 
            color: #444; 
            padding: 15px; 
            background-color: #f9fafb; 
            border-left: 4px solid #000; 
            margin-bottom: 30px; 
            white-space: pre-wrap; 
        }
        .qr-box img { width: 80px; height: 80px; border: 1px solid #000; padding: 4px; background: #fff; }
        .info-pill { margin-bottom: 15px; }
        .footer-info-label { font-size: 9px; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 2px; }
        
        .sig-block { text-align: right; }
        .sig-line { 
            border-top: 2px solid #000; 
            width: 180px; 
            margin-left: auto; 
            margin-top: 10px; 
            padding-top: 8px; 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
        }

        .bottom-bar { 
            margin-top: 50px; 
            text-align: center; 
            font-size: 9px; 
            font-weight: 700; 
            color: #999; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
        .text-right { text-align: right; }
        /*]]>*/
    </style>
</head>
<body>
<div class="invoice-container">
    
    <table class="brand-section-table">
        <tr>
			<td style="vertical-align: middle;">
			    <table style="width: auto; border-collapse: collapse; table-layout: auto;">
			        <tr>
			            <td th:if="${invoice.showLogo and invoice.logoBase64 != null}" 
			                style="vertical-align: middle; padding-right: 15px; width: 1%;">
			                <img th:src="${invoice.logoBase64}" 
			                     class="logo-img" 
			                     alt="Logo" 
			                     style="display: block; max-height: 75px; max-width: 250px;"/>
			            </td>

			            <td style="vertical-align: middle; text-align: left;">
			                <h1 class="company-name-header" 
			                    style="margin: 0; line-height: 1.2; font-size: 24px; font-weight: 800; word-wrap: break-word; word-wrap: break-word;"
			                    th:text="${(invoice.companyName != null and !invoice.companyName.isEmpty()) ? invoice.companyName : 'INVOICE'}">
			                    COMPANY NAME
			                </h1>
			            </td>
			        </tr>
			    </table>
			</td>
        </tr>
    </table>

    <table class="meta-strip">
        <tr>
            <td width="25%">
                <div class="meta-label">Invoice Reference</div>
                <div class="meta-value" th:text="${invoice.invoiceNumber}">#INV-001</div>
            </td>
            <td width="25%">
                <div class="meta-label">Date of Issue</div>
                <div class="meta-value" th:text="${invoice.date}">2026-04-05</div>
            </td>
            <td width="50%" class="text-right">
                <div class="meta-label">Amount Due</div>
                <div class="meta-value" style="font-size: 20px;" 
                     th:text="${invoice.currency + ' ' + #numbers.formatDecimal(invoice.getTotal(), 1, 2)}">
                    $ 0.00
                </div>
            </td>
        </tr>
    </table>

    <table class="address-grid">
        <tr>
            <td width="50%">
                <span class="section-heading">Origin</span>
                <div class="address-text">
                    <strong th:text="${invoice.senderName}">Sender Name</strong>
                    <span th:if="${invoice.showEmail}" th:text="${invoice.senderEmail}"></span><br th:if="${invoice.showEmail}"/>
                    <span th:if="${invoice.showContact}" th:text="'T: ' + ${invoice.senderContact}"></span><br th:if="${invoice.showContact}"/>
                    <span th:if="${invoice.showAddress}" th:text="${invoice.senderAddress}"></span><br th:if="${invoice.showAddress}"/>
                    <span th:if="${invoice.showTaxId}" th:text="'VAT/TAX ID: ' + ${invoice.taxId}" style="font-weight: bold;"></span>
                </div>
            </td>
            <td width="50%" class="text-right">
                <span class="section-heading">Recipient</span>
                <div class="address-text" style="padding-right: 0;">
                    <strong th:text="${invoice.clientName}">Client Name</strong>
                    </div>
            </td>
        </tr>
    </table>

    <table class="item-table">
        <thead>
            <tr>
                <th width="45%">Description</th>
                <th width="15%">Qty</th>
                <th width="20%">Rate</th>
                <th width="20%" class="text-right">Subtotal</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${invoice.items}">
                <td th:text="${item.description}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${invoice.currency + ' ' + #numbers.formatDecimal(item.price, 1, 2)}"></td>
                <td class="text-right" style="font-weight: 700;" 
                    th:text="${invoice.currency + ' ' + #numbers.formatDecimal(item.quantity * item.price, 1, 2)}">
                </td>
            </tr>
        </tbody>
    </table>

    <div class="summary-wrapper">
        <table class="summary-table">
            <tr th:if="${invoice.taxEnabled}">
                <td class="meta-label" th:text="'Tax (' + ${invoice.taxRate} + '%)'"></td>
                <td class="text-right" style="font-weight: 600;" 
                    th:text="${invoice.currency + ' ' + #numbers.formatDecimal(invoice.getTax(), 1, 2)}"></td>
            </tr>
            <tr class="total-row">
                <td class="total-label">Grand Total</td>
                <td class="total-amount" 
                    th:text="${invoice.currency + ' ' + #numbers.formatDecimal(invoice.getTotal(), 1, 2)}"></td>
            </tr>
        </table>
    </div>

    <div class="footer-details">
        <div th:if="${invoice.showNotes}" class="notes-container" th:text="${invoice.notes}"></div>

        <table style="width: 100%;">
            <tr>
                <td width="65%" style="vertical-align: bottom;">
                    <table>
                        <tr>
                            <td th:if="${invoice.showQrCode}" width="100px">
                                <div class="qr-box" style="text-align: center;">
                                    <img th:src="${invoice.qrCodeBase64}" alt="Payment QR"/>
                                    <div style="font-size: 8px; font-weight: 800; margin-top: 4px;">SCAN TO PAY</div>
                                </div>
                            </td>
                            <td style="padding-left: 15px;">
                                <div th:if="${invoice.showWorkingHrs}" class="info-pill">
                                    <div class="footer-info-label">Operating Hours</div>
                                    <div style="font-size: 12px; font-weight: 500;" th:text="${invoice.workingHrs}"></div>
                                </div>
                                <div th:if="${invoice.showWebsite}" class="info-pill">
                                    <div class="footer-info-label">Online</div>
                                    <a th:href="${invoice.clientWebsite}" 
                                       style="font-size: 12px; font-weight: 700; color: #000; text-decoration: none; border-bottom: 1px solid #000;" 
                                       th:text="${invoice.clientWebsite}"></a>
                                </div>
                            </td>
                        </tr>
                    </table>
                </td>
                <td width="35%" class="sig-block" style="vertical-align: bottom;">
                    <div th:if="${invoice.showSignature}">
                        <img th:src="${invoice.signatureBase64}" style="max-height: 60px; max-width: 160px;" alt="Signature"/>
                        <div class="sig-line">Authorized Signatory</div>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div class="bottom-bar">Created with <strong>InvoGen</strong></div>
</div>
</body>
</html>
