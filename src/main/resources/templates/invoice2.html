<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        /* Modern Reset and Typography */
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            color: #1e293b; 
            margin: 0; 
            padding: 40px; 
            line-height: 1.6;
            background-color: #f8fafc;
        }
        
        .invoice-container { 
            max-width: 1000px;
            margin: 0 auto;
            padding: 50px; 
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-radius: 8px;
        }

        /* Top Header Section */
        .header-wrapper {
            display: table;
            width: 100%;
            margin-bottom: 50px;
        }
        .header-left { display: table-cell; vertical-align: top; }
        .header-right { display: table-cell; vertical-align: top; text-align: right; }

        .logo { max-height: 60px; margin-bottom: 15px; }
        .company-title { 
            font-size: 32px; 
            font-weight: 800; 
            color: #4f46e5; 
            letter-spacing: -0.025em;
            margin: 0;
            text-transform: uppercase;
        }
        
        .invoice-meta { color: #64748b; font-size: 14px; }
        .invoice-id { color: #1e293b; font-weight: bold; font-size: 18px; margin-bottom: 4px; }

        /* Addressing Section */
        .address-grid { width: 100%; border-collapse: collapse; margin-bottom: 40px; }
        .address-col { width: 50%; vertical-align: top; }
        .section-label { 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            color: #94a3b8; 
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .address-details { font-size: 14px; color: #475569; }
        .client-name { font-size: 16px; font-weight: 700; color: #1e293b; }

        /* Line Items Table */
        .item-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .item-table th { 
            text-align: left; 
            padding: 12px 15px; 
            border-bottom: 2px solid #f1f5f9; 
            color: #64748b; 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .item-table td { 
            padding: 18px 15px; 
            border-bottom: 1px solid #f1f5f9; 
            font-size: 14px; 
        }
        .item-description { font-weight: 500; color: #1e293b; }
        
        /* Summary Section */
        .summary-wrapper { width: 100%; margin-top: 30px; }
        .summary-table { width: 280px; margin-left: auto; border-collapse: collapse; }
        .summary-table td { padding: 8px 15px; font-size: 14px; }
        .summary-label { color: #64748b; text-align: right; }
        .summary-value { text-align: right; font-weight: 500; color: #1e293b; }
        
        .total-row td { 
            padding-top: 20px;
            border-top: 2px solid #f1f5f9;
        }
        .grand-total-label { font-size: 18px; font-weight: 700; color: #1e293b; }
        .grand-total-amount { font-size: 24px; font-weight: 800; color: #4f46e5; }

        /* Footer */
        .footer { 
            margin-top: 60px; 
            text-align: center; 
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }
        .footer-text { font-size: 12px; color: #94a3b8; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #eef2ff;
            color: #4f46e5;
            border-radius: 20px;
            font-weight: 600;
        }

        .text-right { text-align: right; }
    </style>
</head>
<body>

<div class="invoice-container">
    
    <div class="header-wrapper">
        <div class="header-left">
            <div th:if="${invoice.showLogo}">
                <img th:if="${invoice.logoBase64 != null and !invoice.logoBase64.isEmpty()}" 
                     th:src="${invoice.logoBase64}" 
                     class="logo"/>
            </div>
            <h1 class="company-title" 
                th:text="${invoice.companyName != null and !invoice.companyName.isEmpty() ? invoice.companyName : 'INVOICE'}">
            </h1>
        </div>
        <div class="header-right">
            <div class="invoice-id">Invoice #<span th:text="${invoice.invoiceNumber}"></span></div>
            <div class="invoice-meta">Issued on: <span th:text="${invoice.date}"></span></div>
        </div>
    </div>

    <table class="address-grid">
        <tr>
            <td class="address-col">
                <div class="section-label">Sender</div>
                <div class="address-details">
                    <strong class="client-name" th:text="${invoice.senderName}"></strong><br/>
                    <span th:if="${invoice.showEmail}" th:text="${invoice.senderEmail}"></span><br th:if="${invoice.showEmail}"/>
                    <span th:if="${invoice.showContact}" th:text="${invoice.senderContact}"></span><br th:if="${invoice.showContact}"/>
                    <span th:if="${invoice.showAddress}" th:text="${invoice.senderAddress}"></span><br th:if="${invoice.showAddress}"/>
                    <span th:if="${invoice.showTaxId}" style="margin-top: 5px; display: block;">
                        <strong>Tax ID:</strong> <span th:text="${invoice.taxId}"></span>
                    </span>
                </div>
            </td>
            <td class="address-col text-right">
                <div class="section-label">Bill To</div>
                <div class="address-details">
                    <strong class="client-name" th:text="${invoice.clientName}"></strong>
                </div>
            </td>
        </tr>
    </table>

    <table class="item-table">
        <thead>
            <tr>
                <th width="50%">Description</th>
                <th width="10%">Qty</th>
                <th width="20%">Price</th>
                <th width="20%" class="text-right">Total</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${invoice.items}">
                <td class="item-description" th:text="${item.description}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="|${invoice.currency} ${#numbers.formatDecimal(item.price, 1, 2)}|"></td>
                <td class="text-right" th:text="|${invoice.currency} ${#numbers.formatDecimal(item.quantity * item.price, 1, 2)}|"></td>
            </tr>
        </tbody>
    </table>

    <div class="summary-wrapper">
        <table class="summary-table">
            <tr th:if="${invoice.taxEnabled}">
                <td class="summary-label">Tax (<span th:text="${invoice.taxRate}"></span>%)</td>
                <td class="summary-value" th:text="|${invoice.currency} ${#numbers.formatDecimal(invoice.getTax(), 1, 2)}|"></td>
            </tr>
            <tr class="total-row">
                <td class="summary-label grand-total-label">Grand Total</td>
                <td class="summary-value grand-total-amount" th:text="|${invoice.currency} ${#numbers.formatDecimal(invoice.getTotal(), 1, 2)}|"></td>
            </tr>
        </table>
    </div>

    <div class="footer">
        <div class="footer-text">
            Thank you for your business.
            <br/><br/>
            <span class="badge">Created with Invoice Generator</span>
        </div>
    </div>
</div>

</body>
</html>
